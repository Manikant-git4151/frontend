<!DOCTYPE html>
<html>

<head>
  <title>CSS Transition Button</title>
  <style>
    body {
      text-align: center;
      margin-top: 100px;
      font-family: Arial;
    }

    button {
      background-color: blue;
      color: white;
      padding: 15px 30px;
      border: none;
      font-size: 18px;
      cursor: pointer;


      transition: all 0.3s;
    }

    button:hover {
      background-color: red;


      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <button>Click Me</button>

</body>

</html>
