<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Layout</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial;
      margin: 0;
    }

    header, nav, main, aside, footer {
      padding: 10px;
      border: 1px solid #ccc;
    }

    header { background: #eee; }
    footer { background: #eee; text-align: center; }

 
    nav {
      display: flex;
      gap: 10px;
      background: #ddd;
    }

    nav a {
      text-decoration: none;
      color: black;
    }

   
    .container {
      display: grid;
      grid-template-columns: 3fr 1fr;
      gap: 10px;
      padding: 10px;
    }

    main { background: #fafafa; }
    aside { background: #f0f0f0; }

   
    @media (max-width: 900px) {
      .container {
        grid-template-columns: 2fr 1fr;
      }
    }


    @media (max-width: 600px) {
      nav {
        flex-direction: column;
      }

      .container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>My Website</h1>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav>

<div class="container">
  <main>
    <h2>Content</h2>
    <p>This is the main content area.</p>
    <p>It uses CSS Grid for layout.</p>
  </main>

  <aside>
    <h2>Sidebar</h2>
    <p>Some extra links or info.</p>
  </aside>
</div>

<footer>
  <p>Footer</p>
</footer>

</body>
</html>
