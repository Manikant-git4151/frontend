<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Page</title>
</head>

<body>

    <header>
        <h1>My Website</h1>
        <p>Hello :)</p>
    </header>

    <nav>
        <a href="#home">Home</a> |
        <a href="#articles">Articles</a> |
        <a href="#contact">Contact</a>
    </nav>

    <main id="home">

        <section id="articles">
            <h2>Articles</h2>

            <article>
                <h3>First Post</h3>
                <img src="image1.jpg" alt="simple picture" height="120">
                <p>This is my first post.</p>
                <a href="#">Read more about first post</a>
            </article>

            <article>
                <h3>Second Post</h3>
                <img src="image2.jpg" alt="another simple picture" height="120">
                <p>This is my second post.</p>
                <a href="#">Read more about second post</a>
            </article>

        </section>

        <section id="contact">
            <h2>Contact</h2>

            <form>
                <label for="name">Name:</label>
                <input type="text" id="name"><br><br>

                <label for="email">Email:</label>
                <input type="email" id="email"><br><br>

                <label for="message">Message:</label>
                <textarea id="message"></textarea><br><br>

                <button type="submit">Send</button>
            </form>
        </section>

    </main>

    <aside>
        <h2>Links</h2>
        <ul>
            <li><a href="#">Link one</a></li>
            <li><a href="#">Link two</a></li>
        </ul>
    </aside>

    <footer>
        <p>bye</p>
    </footer>

</body>

</html>
