<!DOCTYPE html>
<html>
<head>
    <title>To Do App</title>
    <style>
        body {
            font-family: Arial;
            background-color: lightgray;
        }

        .box {
            background-color: white;
            padding: 10px;
            width: 300px;
            margin: 50px auto;
            border: 1px solid black;
        }

        input {
            width: 70%;
        }

        button {
            margin-top: 5px;
        }

        li {
            margin-top: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h3>My To Do List</h3>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button id="addBtn">Add</button>

    <ul id="list"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
